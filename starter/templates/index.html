<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sudoku Game</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <h1>Sudoku Game</h1>
  <div id="sudoku-board"></div>
  <div class="controls">
    <button id="theme-toggle">🌙 Dark Mode</button>
    <label for="player-name">Player:</label>
    <input id="player-name" type="text" maxlength="24" value="Player" aria-label="Player name">
    <label for="difficulty">Difficulty:</label>
    <select id="difficulty" aria-label="Select Sudoku difficulty">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>
    <button id="new-game">New Game</button>
    <button id="hint">Hint</button>
    <button id="check-solution">Check Solution</button>
    <span id="timer" class="timer" aria-live="polite">00:00</span>
    <span id="message"></span>
  </div>
  <div class="scoreboard">
    <h2>Top 10 Fastest Times</h2>
    <ol id="scoreboard-list"></ol>
  </div>
  <script src="/static/main.js"></script>
</body>
</html>
